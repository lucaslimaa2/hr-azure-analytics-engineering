[tool.pytest.ini_options]
# `shared` lives under functions/; put it on the path so tests import it directly.
pythonpath = ["functions"]
testpaths = ["tests"]

[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]  # long lines tolerated in data pools / table-like literals
